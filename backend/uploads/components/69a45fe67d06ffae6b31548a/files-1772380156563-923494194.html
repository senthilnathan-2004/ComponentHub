<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  padding:40px;
  background:#f3f4f6;
  font-family:'Poppins',sans-serif;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:30px;
  border-radius:14px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.card span{
  display:block;
  font-size:24px;
  margin-top:10px;
  color:#4f46e5;
}
</style>
</head>

<body>

<div class="dashboard">
  <div class="card">Users <span>1,250</span></div>
  <div class="card">Revenue <span>$8,400</span></div>
  <div class="card">Orders <span>320</span></div>
</div>

</body>
</html>
