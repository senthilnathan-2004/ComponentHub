<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Data Table</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  padding:40px;
  background:#f4f6fb;
  font-family:'Poppins',sans-serif;
}

.table-container{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

th, td{
  padding:16px;
  text-align:left;
}

th{
  background:#4f46e5;
  color:white;
  font-weight:600;
}

tr{
  border-bottom:1px solid #eee;
  transition:0.3s;
}

tr:hover{
  background:#f9fafb;
}

.status{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.active{
  background:#dcfce7;
  color:#16a34a;
}

.pending{
  background:#fef9c3;
  color:#ca8a04;
}

.inactive{
  background:#fee2e2;
  color:#dc2626;
}
</style>
</head>

<body>

<h2>Users List</h2>

<div class="table-container">
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>John Doe</td>
      <td>john@example.com</td>
      <td><span class="status active">Active</span></td>
    </tr>
    <tr>
      <td>Sarah Lee</td>
      <td>sarah@example.com</td>
      <td><span class="status pending">Pending</span></td>
    </tr>
    <tr>
      <td>Mike Ross</td>
      <td>mike@example.com</td>
      <td><span class="status inactive">Inactive</span></td>
    </tr>
  </tbody>
</table>
</div>

</body>
</html>
